version: '3.9'

services:
  postgres:
    image: postgis/postgis:15-3.3
    container_name: ambugo_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ambugo_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - ambugo_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ambugo_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ambugo_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass redis123
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - ambugo_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  ambugo_postgres:
  ambugo_redis:
